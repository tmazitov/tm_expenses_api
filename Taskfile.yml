version: '3'

dotenv: ['.env']

tasks:
  dev:
    desc: "Run service in dev mode."
    cmd: go run ./cmd/main.go
  
  init_db:
    desc: "Initiate a database for dev purposes."
    cmd: cd scripts && bash ./init_database.sh

  migrate:
    desc: "🪿 Create a new migration file using goose"
    cmd: cd scripts && bash ./goose_add_migration.sh

  migrate_up:
    desc: "🪿 Apply all pending migrations"
    cmd: goose -dir db/migrations postgres "host=$DB_HOST port=$DB_PORT user=$DB_USER password=$DB_PASSWORD dbname=$DB_NAME sslmode=$DB_SSL_MODE" up

  migrate_down:
    desc: "🪿 Rollback the last migration"
    cmd: goose -dir db/migrations postgres "host=$DB_HOST port=$DB_PORT user=$DB_USER password=$DB_PASSWORD dbname=$DB_NAME sslmode=$DB_SSL_MODE" down

  docs:
    desc: "Generate swagger.json from annotations"
    cmd: swag init -g cmd/main.go --dir ./ -o api/docs --outputTypes json

  test:
    desc: "Run tests"
    cmd: gotestsum --format testname ./tests/...

